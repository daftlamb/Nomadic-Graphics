<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nomadic Graphics Prototype</title>
    <link rel="stylesheet" href="vendor/litegraph/litegraph.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Bungee&family=IBM+Plex+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700;800&family=Oswald:wght@400;700&family=Press+Start+2P&family=Roboto+Mono:wght@400;700&family=Rubik+Mono+One&family=Space+Mono:wght@400;700&family=Staatliches&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="library-panel" aria-label="Node library">
        <header class="brand">
          <div>
            <p class="eyebrow">Nomadic Graphics</p>
            <h1>Node Library</h1>
          </div>
          <div class="panel-actions">
            <button class="icon-button panel-toggle-button" id="toggleLibraryPanel" title="Collapse node library" aria-label="Collapse node library" aria-expanded="true">
              <svg class="panel-toggle-icon icon-sidebar-left" viewBox="0 0 20 20" aria-hidden="true">
                <rect x="3.5" y="3.5" width="13" height="13" rx="2" />
                <path d="M8 4v12" />
                <path d="M13 7.5 10.5 10l2.5 2.5" />
              </svg>
              <svg class="panel-toggle-icon icon-sidebar-right" viewBox="0 0 20 20" aria-hidden="true">
                <rect x="3.5" y="3.5" width="13" height="13" rx="2" />
                <path d="M12 4v12" />
                <path d="m7 7.5 2.5 2.5L7 12.5" />
              </svg>
            </button>
            <button class="icon-button" id="randomizeButton" title="Reseed graph" aria-label="Reseed graph">R</button>
          </div>
        </header>

        <nav class="node-library" id="nodeLibrary" aria-label="Process library"></nav>
      </aside>

      <section class="workspace-panel" aria-label="Node workspace">
        <header class="top-bar">
          <div>
            <p class="eyebrow">LiteGraph Workspace</p>
          <h2 id="workflowTitle">Manual Geometry Graph</h2>
          </div>
          <div class="export-actions">
            <button id="undoButton">Undo</button>
            <button id="redoButton">Redo</button>
            <button id="savePatchButton">Save</button>
            <button id="loadPatchButton">Load</button>
            <button id="exportPatchButton">Export</button>
            <button id="openPatchButton">Open</button>
            <select id="themeSelect" aria-label="Interface theme">
              <option value="paper">Paper</option>
              <option value="survey">Survey</option>
              <option value="night">Night</option>
            </select>
            <button id="fitButton">Fit</button>
            <button id="exportSvgButton">SVG</button>
            <button id="exportPngButton">PNG</button>
            <a class="toolbar-link" href="help.html" target="_blank" rel="noreferrer">Help</a>
          </div>
        </header>

        <div class="graph-viewport">
          <canvas id="graphCanvas"></canvas>
        </div>
      </section>

      <aside class="params-panel" aria-label="Node parameters">
        <header>
          <div>
            <p class="eyebrow">Node Inspector</p>
            <h2 id="selectedNodeName">No Node Selected</h2>
          </div>
          <button class="icon-button panel-toggle-button" id="toggleInspectorPanel" title="Collapse node inspector" aria-label="Collapse node inspector" aria-expanded="true">
            <svg class="panel-toggle-icon icon-sidebar-left" viewBox="0 0 20 20" aria-hidden="true">
              <rect x="3.5" y="3.5" width="13" height="13" rx="2" />
              <path d="M8 4v12" />
              <path d="M13 7.5 10.5 10l2.5 2.5" />
            </svg>
            <svg class="panel-toggle-icon icon-sidebar-right" viewBox="0 0 20 20" aria-hidden="true">
              <rect x="3.5" y="3.5" width="13" height="13" rx="2" />
              <path d="M12 4v12" />
              <path d="m7 7.5 2.5 2.5L7 12.5" />
            </svg>
          </button>
        </header>

        <section class="process-note">
          <p id="nodeDescription">Add nodes from the library, connect typed outputs to compatible inputs, then attach a Preview node.</p>
        </section>

        <section class="inspector-preview-wrap" aria-label="Selected node preview">
          <canvas id="inspectorPreview" width="520" height="360"></canvas>
        </section>

        <section class="specimen">
          <p class="eyebrow">Port / Data</p>
          <ul id="outputTraits"></ul>
        </section>
      </aside>
    </main>

    <script src="vendor/litegraph/litegraph.js"></script>
    <script src="vendor/paper/paper-full.min.js"></script>
    <script src="vendor/ort/ort.wasm.min.js"></script>
    <script src="geometry-engine.js?v=55"></script>
    <script src="app.js?v=81"></script>
  </body>
</html>
