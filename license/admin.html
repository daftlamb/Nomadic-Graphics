<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>License Admin</title>
<style>
:root{--bg:#eee8e1;--panel:#fffaf5;--line:#d9cec0;--text:#231c18;--muted:#786b60;--accent:#536b57}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}
main{max-width:760px;margin:0 auto;padding:24px}
h1{margin:0 0 6px;font:600 34px/1.1 ui-monospace,Consolas,monospace}
p{margin:0;color:var(--muted);line-height:1.5}
.card{margin-top:18px;padding:16px;border:1px solid var(--line);border-radius:10px;background:var(--panel);box-shadow:0 18px 48px rgba(35,28,24,.12)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:grid;gap:6px;font-size:12px;color:var(--muted)}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:7px;background:#fff;padding:10px;color:var(--text);font:inherit}
textarea{min-height:150px;resize:vertical;font-family:Consolas,monospace;font-size:12px}
button{min-height:38px;border:1px solid var(--line);border-radius:7px;background:#fff8f1;color:var(--text);cursor:pointer;font:inherit}
button.primary{border-color:#536b57;background:var(--accent);color:#fff8f1}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.status{min-height:18px;margin-top:10px;font-size:12px;color:var(--muted)}
.payload{margin-top:12px;font-size:12px;color:var(--muted);white-space:pre-wrap}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
  <h1>License Admin</h1>
  <p>Local-only license generator. The private key stays on this machine.</p>
  <section class="card">
    <div class="grid">
      <label>Email
        <input id="email" type="email" placeholder="customer@example.com" autocomplete="off" spellcheck="false">
      </label>
      <label>App
        <select id="app">
          <option value="nomadic-graphics">nomadic-graphics</option>
          <option value="emboss-lab">emboss-lab</option>
          <option value="mapit-pro">mapit-pro</option>
          <option value="*">*</option>
        </select>
      </label>
      <label>Edition
        <select id="edition">
          <option value="standard">standard</option>
          <option value="pro">pro</option>
          <option value="lifetime">lifetime</option>
        </select>
      </label>
      <label>Expires
        <input id="expires" type="date">
      </label>
    </div>
    <div class="actions">
      <button class="primary" id="generate" type="button">Generate License</button>
      <button id="copy" type="button">Copy Code</button>
    </div>
    <div class="status" id="status"></div>
    <label style="margin-top:12px">License Code
      <textarea id="code" spellcheck="false"></textarea>
    </label>
    <div class="payload" id="payload"></div>
  </section>
</main>
<script>
(function(){
  var code=document.getElementById('code'), payload=document.getElementById('payload'), status=document.getElementById('status');
  function value(id){return document.getElementById(id).value}
  document.getElementById('generate').addEventListener('click',function(){
    status.textContent='Generating...';
    window.licenseAdmin.generate({email:value('email'),app:value('app'),edition:value('edition'),expires:value('expires')}).then(function(result){
      code.value=result.code;
      payload.textContent=JSON.stringify(result.payload,null,2);
      status.textContent='License generated.';
    }).catch(function(error){
      status.textContent=error.message||'Could not generate license.';
    });
  });
  document.getElementById('copy').addEventListener('click',function(){
    window.licenseAdmin.copy(code.value).then(function(){status.textContent='Copied.'});
  });
})();
</script>
</body>
</html>
